{% extends 'gestion/base.html' %}

{% block title %}Eliminar libro{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'lista_libros' %}" class="text-muted text-decoration-none" style="font-size:0.85rem;">&#8592; Volver a libros</a>
    <h1 class="page-title mt-1 mb-0">Eliminar libro</h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card p-4">
            <p class="mb-1">¿Eliminar <strong>{{ libro.titulo }}</strong>?</p>
            <p class="text-muted" style="font-size:0.85rem;">Esta acción no se puede deshacer.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 pt-3 border-top mt-2">
                    <button type="submit" class="btn btn-danger btn-sm px-4">Sí, eliminar</button>
                    <a href="{% url 'lista_libros' %}" class="btn btn-outline-secondary btn-sm px-3">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
